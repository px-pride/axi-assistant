[project]
name = "discord-e2e"
version = "0.1.0"
description = "Reusable Discord end-to-end test helpers"
requires-python = ">=3.12"
dependencies = [
    "discordquery",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["discord_e2e"]
