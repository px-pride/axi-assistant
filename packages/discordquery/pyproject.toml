[project]
name = "discordquery"
version = "0.1.0"
description = "Lightweight Discord REST API client and query tool"
requires-python = ">=3.12"
dependencies = [
    "httpx[socks]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["discordquery"]
