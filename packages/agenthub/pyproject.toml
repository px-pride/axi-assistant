[project]
name = "agenthub"
version = "0.1.0"
description = "Agent lifecycle management over procmux + claudewire"
requires-python = ">=3.12"
dependencies = [
    "claudewire",
    "procmux",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agenthub"]
