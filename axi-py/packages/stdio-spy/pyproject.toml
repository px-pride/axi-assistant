[project]
name = "stdio-spy"
version = "0.1.0"
description = "Bidirectional stdio proxy/logger — tee for stdin/stdout/stderr"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
stdio-spy = "stdio_spy:main"
claude-spy = "stdio_spy:claude_spy_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["stdio_spy"]
