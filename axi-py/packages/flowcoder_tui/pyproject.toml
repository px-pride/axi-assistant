[project]
name = "flowcoder-tui"
version = "0.1.0"
description = "Terminal UI for flowcoder — spinners, streaming output, progress"
requires-python = ">=3.12"
dependencies = [
    "flowcoder-engine>=0.1.0",
    "flowcoder-flowchart>=0.1.0",
]

[project.scripts]
flowcoder = "flowcoder_tui.__main__:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["flowcoder_tui"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
