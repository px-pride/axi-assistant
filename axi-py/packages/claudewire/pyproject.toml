[project]
name = "claudewire"
version = "0.1.0"
description = "Claude CLI stream-json protocol wrapper"
requires-python = ">=3.12"
dependencies = [
    "opentelemetry-api>=1.20",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["claudewire"]
